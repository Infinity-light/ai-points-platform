name: Deploy to VPS

on:
  push:
    branches:
      - master

env:
  BACKEND_IMAGE: ghcr.io/infinity-light/ai-points-backend
  FRONTEND_IMAGE: ghcr.io/infinity-light/ai-points-frontend
  DEPLOY_DIR: /opt/apps/ai-points-platform

jobs:
  build:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

  deploy:
    name: Deploy to Server
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy compose file to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: docker-compose.prod.yml
          target: ${{ env.DEPLOY_DIR }}

      - name: Deploy on server
        uses: appleboy/ssh-action@v1
        env:
          GHCR_PAT: ${{ secrets.GHCR_PAT }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          JWT_REFRESH_SECRET: ${{ secrets.JWT_REFRESH_SECRET }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: GHCR_PAT,DB_PASSWORD,JWT_SECRET,JWT_REFRESH_SECRET,LLM_API_KEY,SMTP_PASS
          command_timeout: 15m
          script: |
            set -e
            cd /opt/apps/ai-points-platform

            # Ensure ubuntu is in docker group (takes effect immediately for new exec)
            sudo usermod -aG docker ubuntu || true

            # Login to GHCR to pull private images
            echo "$GHCR_PAT" | sudo docker login ghcr.io -u infinity-light --password-stdin

            # Write .env (static vars first, secrets appended via printf to avoid injection)
            cat > .env << 'ENVEOF'
            NODE_ENV=production
            PORT=3000
            DB_HOST=postgres
            DB_PORT=5432
            DB_USERNAME=postgres
            DB_NAME=ai_points_platform
            REDIS_HOST=redis
            REDIS_PORT=6379
            JWT_EXPIRES_IN=15m
            JWT_REFRESH_EXPIRES_IN=7d
            LLM_MODEL=claude-sonnet-4-6
            LLM_TEMPERATURE=0.3
            UPLOAD_DIR=./uploads
            MAX_FILE_SIZE_MB=10
            ENVEOF
            sed -i 's/^[[:space:]]*//' .env
            printf 'DB_PASSWORD=%s\n' "$DB_PASSWORD" >> .env
            printf 'JWT_SECRET=%s\n' "$JWT_SECRET" >> .env
            printf 'JWT_REFRESH_SECRET=%s\n' "$JWT_REFRESH_SECRET" >> .env
            printf 'LLM_API_KEY=%s\n' "$LLM_API_KEY" >> .env
            printf 'SMTP_PASS=%s\n' "$SMTP_PASS" >> .env

            # Pull latest images from GHCR
            sudo docker compose -f docker-compose.prod.yml pull

            # Start / update all services
            sudo docker compose -f docker-compose.prod.yml up -d --remove-orphans

            # Wait for backend to be healthy (up to 60s)
            echo "Waiting for backend..."
            for i in $(seq 1 12); do
              STATUS=$(curl -s -o /dev/null -w '%{http_code}' http://127.0.0.1:4000/health || true)
              if [ "$STATUS" = "200" ]; then
                echo "Backend healthy"
                break
              fi
              echo "  attempt $i/12: HTTP $STATUS, waiting 5s..."
              sleep 5
            done

            # Run database migrations
            echo "Running migrations..."
            sudo docker compose -f docker-compose.prod.yml exec -T backend \
              node_modules/.bin/typeorm migration:run -d dist/database/data-source.js

            # Remove dangling images
            sudo docker image prune -f
            echo "Deployment complete"

      - name: Health check
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            for i in 1 2 3 4 5; do
              STATUS=$(curl -s -o /dev/null -w '%{http_code}' http://127.0.0.1:4100/ || true)
              if [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 500 ]; then
                echo "Health check passed (HTTP $STATUS)"
                exit 0
              fi
              echo "Attempt $i: HTTP $STATUS, retrying in 5s..."
              sleep 5
            done
            echo "Health check failed — recent logs:"
            sudo docker compose -f /opt/apps/ai-points-platform/docker-compose.prod.yml logs --tail 50
            exit 1
