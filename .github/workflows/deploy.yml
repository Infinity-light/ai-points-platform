name: Deploy to VPS

on:
  push:
    branches:
      - master

env:
  DEPLOY_DIR: /opt/apps/ai-points-platform
  SRC_DIR: /opt/apps/ai-points-src

jobs:
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Archive source code
        run: |
          git archive HEAD -o source.tar.gz
          ls -lh source.tar.gz

      - name: Transfer source to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "source.tar.gz,docker-compose.prod.yml"
          target: /tmp/deploy

      - name: Build and deploy on server
        uses: appleboy/ssh-action@v1
        env:
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          JWT_REFRESH_SECRET: ${{ secrets.JWT_REFRESH_SECRET }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: DB_PASSWORD,JWT_SECRET,JWT_REFRESH_SECRET,LLM_API_KEY,SMTP_PASS
          command_timeout: 45m
          script: |
            set -e

            # Ensure ubuntu can use docker
            sudo usermod -aG docker ubuntu || true

            # Extract source to build directory
            sudo rm -rf ${{ env.SRC_DIR }}
            sudo mkdir -p ${{ env.SRC_DIR }}
            sudo tar xzf /tmp/deploy/source.tar.gz -C ${{ env.SRC_DIR }}
            sudo chown -R ubuntu:ubuntu ${{ env.SRC_DIR }}

            # Build backend image on server (uses China mirrors configured in Dockerfile)
            echo "Building backend image..."
            sudo docker build -t ai-points-backend:latest \
              -f ${{ env.SRC_DIR }}/backend/Dockerfile \
              ${{ env.SRC_DIR }}

            # Build frontend image on server
            echo "Building frontend image..."
            sudo docker build -t ai-points-frontend:latest \
              -f ${{ env.SRC_DIR }}/frontend/Dockerfile \
              ${{ env.SRC_DIR }}

            # Tag for docker-compose.prod.yml
            sudo docker tag ai-points-backend:latest ghcr.io/infinity-light/ai-points-backend:latest
            sudo docker tag ai-points-frontend:latest ghcr.io/infinity-light/ai-points-frontend:latest

            # Setup deploy directory and compose file
            sudo mkdir -p ${{ env.DEPLOY_DIR }}
            sudo cp /tmp/deploy/docker-compose.prod.yml ${{ env.DEPLOY_DIR }}/docker-compose.prod.yml
            sudo chown ubuntu:ubuntu ${{ env.DEPLOY_DIR }}/docker-compose.prod.yml

            # Write .env
            cd ${{ env.DEPLOY_DIR }}
            cat > .env << 'ENVEOF'
            NODE_ENV=production
            PORT=3000
            DB_HOST=postgres
            DB_PORT=5432
            DB_USERNAME=postgres
            DB_NAME=ai_points_platform
            REDIS_HOST=redis
            REDIS_PORT=6379
            JWT_EXPIRES_IN=15m
            JWT_REFRESH_EXPIRES_IN=7d
            LLM_MODEL=claude-sonnet-4-6
            LLM_TEMPERATURE=0.3
            SMTP_HOST=smtp.resend.com
            SMTP_PORT=465
            SMTP_USER=resend
            EMAIL_FROM=AI积分平台 <onboarding@resend.dev>
            UPLOAD_DIR=./uploads
            MAX_FILE_SIZE_MB=10
            ENVEOF
            sed -i 's/^[[:space:]]*//' .env
            printf 'DB_PASSWORD=%s\n' "$DB_PASSWORD" >> .env
            printf 'JWT_SECRET=%s\n' "$JWT_SECRET" >> .env
            printf 'JWT_REFRESH_SECRET=%s\n' "$JWT_REFRESH_SECRET" >> .env
            printf 'LLM_API_KEY=%s\n' "$LLM_API_KEY" >> .env
            printf 'SMTP_PASS=%s\n' "$SMTP_PASS" >> .env

            # Start / update all services (images already built above)
            sudo docker compose -f docker-compose.prod.yml up -d --remove-orphans --pull never

            # Wait for backend to be healthy (up to 90s)
            echo "Waiting for backend..."
            for i in $(seq 1 18); do
              STATUS=$(curl -s -o /dev/null -w '%{http_code}' http://127.0.0.1:4000/health || true)
              if [ "$STATUS" = "200" ]; then
                echo "Backend healthy after $i attempts"
                break
              fi
              echo "  attempt $i/18: HTTP $STATUS, waiting 5s..."
              sleep 5
            done

            # Run database migrations
            echo "Running migrations..."
            sudo docker compose -f docker-compose.prod.yml exec -T backend \
              node_modules/.bin/typeorm migration:run -d dist/database/data-source.js

            # Configure Nginx reverse proxy (idempotent, base64 to avoid YAML heredoc issues)
            echo "Configuring Nginx..."
            sudo apt-get install -y -q nginx certbot python3-certbot-nginx
            echo "" | base64 -d | sudo tee /etc/nginx/sites-available/points.godpenai.com
            sudo ln -sf /etc/nginx/sites-available/points.godpenai.com /etc/nginx/sites-enabled/points.godpenai.com
            sudo nginx -t && sudo systemctl reload nginx
            # Obtain / renew SSL certificate (non-interactive, skips if already valid)
            sudo certbot --nginx -d points.godpenai.com --non-interactive --agree-tos --email admin@godpenai.com --redirect || echo "Certbot skipped (already valid or rate-limited)"

            # Cleanup
            rm -rf /tmp/deploy
            sudo docker image prune -f
            echo "Deployment complete"

      - name: Health check
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            for i in 1 2 3 4 5; do
              STATUS=$(curl -s -o /dev/null -w '%{http_code}' http://127.0.0.1:4100/ || true)
              if [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 500 ]; then
                echo "Health check passed (HTTP $STATUS)"
                exit 0
              fi
              echo "Attempt $i: HTTP $STATUS, retrying in 5s..."
              sleep 5
            done
            echo "Health check failed — recent logs:"
            sudo docker compose -f /opt/apps/ai-points-platform/docker-compose.prod.yml logs --tail 50
            exit 1
