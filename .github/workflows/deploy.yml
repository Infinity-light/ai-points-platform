name: Deploy to VPS

on:
  push:
    branches:
      - master

env:
  DEPLOY_DIR: /opt/apps/ai-points-platform

jobs:
  build-and-deploy:
    name: Build Images & Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        run: |
          docker build -t ai-points-backend:latest -f ./backend/Dockerfile .
          docker save ai-points-backend:latest | gzip > backend.tar.gz
          ls -lh backend.tar.gz

      - name: Build frontend image
        run: |
          docker build -t ai-points-frontend:latest -f ./frontend/Dockerfile .
          docker save ai-points-frontend:latest | gzip > frontend.tar.gz
          ls -lh frontend.tar.gz

      - name: Transfer images to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "backend.tar.gz,frontend.tar.gz"
          target: "/tmp"

      - name: Copy compose file to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: docker-compose.prod.yml
          target: ${{ env.DEPLOY_DIR }}

      - name: Deploy on server
        uses: appleboy/ssh-action@v1
        env:
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          JWT_REFRESH_SECRET: ${{ secrets.JWT_REFRESH_SECRET }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: DB_PASSWORD,JWT_SECRET,JWT_REFRESH_SECRET,LLM_API_KEY,SMTP_PASS
          command_timeout: 30m
          script: |
            set -e

            # Ensure ubuntu can use docker
            sudo usermod -aG docker ubuntu || true

            # Load pre-built images from SCP'd tarballs
            echo "Loading backend image..."
            sudo docker load < /tmp/ai-points-platform/backend.tar.gz
            echo "Loading frontend image..."
            sudo docker load < /tmp/ai-points-platform/frontend.tar.gz

            # Tag for docker-compose.prod.yml image names
            sudo docker tag ai-points-backend:latest ghcr.io/infinity-light/ai-points-backend:latest
            sudo docker tag ai-points-frontend:latest ghcr.io/infinity-light/ai-points-frontend:latest

            # Write .env
            cd ${{ env.DEPLOY_DIR }}
            cat > .env << 'ENVEOF'
            NODE_ENV=production
            PORT=3000
            DB_HOST=postgres
            DB_PORT=5432
            DB_USERNAME=postgres
            DB_NAME=ai_points_platform
            REDIS_HOST=redis
            REDIS_PORT=6379
            JWT_EXPIRES_IN=15m
            JWT_REFRESH_EXPIRES_IN=7d
            LLM_MODEL=claude-sonnet-4-6
            LLM_TEMPERATURE=0.3
            UPLOAD_DIR=./uploads
            MAX_FILE_SIZE_MB=10
            ENVEOF
            sed -i 's/^[[:space:]]*//' .env
            printf 'DB_PASSWORD=%s\n' "$DB_PASSWORD" >> .env
            printf 'JWT_SECRET=%s\n' "$JWT_SECRET" >> .env
            printf 'JWT_REFRESH_SECRET=%s\n' "$JWT_REFRESH_SECRET" >> .env
            printf 'LLM_API_KEY=%s\n' "$LLM_API_KEY" >> .env
            printf 'SMTP_PASS=%s\n' "$SMTP_PASS" >> .env

            # Start / update all services (no pull needed — images are loaded)
            sudo docker compose -f docker-compose.prod.yml up -d --remove-orphans --no-pull

            # Wait for backend to be healthy (up to 90s)
            echo "Waiting for backend..."
            for i in $(seq 1 18); do
              STATUS=$(curl -s -o /dev/null -w '%{http_code}' http://127.0.0.1:4000/health || true)
              if [ "$STATUS" = "200" ]; then
                echo "Backend healthy after $i attempts"
                break
              fi
              echo "  attempt $i/18: HTTP $STATUS, waiting 5s..."
              sleep 5
            done

            # Run database migrations
            echo "Running migrations..."
            sudo docker compose -f docker-compose.prod.yml exec -T backend \
              node_modules/.bin/typeorm migration:run -d dist/database/data-source.js

            # Cleanup
            rm -rf /tmp/ai-points-platform/
            sudo docker image prune -f
            echo "Deployment complete"

      - name: Health check
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            for i in 1 2 3 4 5; do
              STATUS=$(curl -s -o /dev/null -w '%{http_code}' http://127.0.0.1:4100/ || true)
              if [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 500 ]; then
                echo "Health check passed (HTTP $STATUS)"
                exit 0
              fi
              echo "Attempt $i: HTTP $STATUS, retrying in 5s..."
              sleep 5
            done
            echo "Health check failed — recent logs:"
            sudo docker compose -f /opt/apps/ai-points-platform/docker-compose.prod.yml logs --tail 50
            exit 1
