name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -t ai-points-platform:${{ github.sha }} .
          echo "Image built successfully"
          docker images ai-points-platform:${{ github.sha }}

      - name: Smoke test
        run: |
          docker run -d --name smoke-test -p 4100:4100 ai-points-platform:${{ github.sha }}
          echo "Waiting for container to start..."
          sleep 8
          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w '%{http_code}' http://127.0.0.1:4100/ || true)
            if [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 500 ]; then
              echo "Smoke test passed (HTTP $STATUS)"
              docker stop smoke-test && docker rm smoke-test
              exit 0
            fi
            echo "Attempt $i: HTTP $STATUS, retrying in 3s..."
            sleep 3
          done
          echo "Smoke test failed"
          docker logs smoke-test
          docker stop smoke-test && docker rm smoke-test
          exit 1

      - name: Package image
        run: |
          docker save ai-points-platform:${{ github.sha }} | gzip > /tmp/image.tar.gz
          ls -lh /tmp/image.tar.gz

      - name: Transfer image to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "/tmp/image.tar.gz"
          target: "/tmp"
          strip_components: 2

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Deploy on server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 15m
          script: |
            set -e
            cd /opt/apps/ai-points-platform

            # Load the pre-built image
            echo "Loading Docker image..."
            docker load < /tmp/image.tar.gz
            rm -f /tmp/image.tar.gz

            # Tag for compose
            IMAGE_ID=$(docker images --format '{{.ID}}' --filter "reference=ai-points-platform" | head -1)
            docker tag $IMAGE_ID ai-points-platform:latest

            # Generate .env
            cat > .env << 'ENVEOF'

            ENVEOF
            sed -i 's/^ *//' .env
            echo "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" >> .env
            echo "JWT_SECRET=${{ secrets.JWT_SECRET }}" >> .env
            echo "JWT_REFRESH_SECRET=${{ secrets.JWT_REFRESH_SECRET }}" >> .env
            echo "LLM_API_KEY=${{ secrets.LLM_API_KEY }}" >> .env
            echo "SMTP_PASS=${{ secrets.SMTP_PASS }}" >> .env

            # Deploy
            docker compose up -d --no-build

            echo "Running database migration..."
            docker compose exec -T ai-points-platform docker compose -f docker-compose.prod.yml exec -T backend node dist/main --migrate


            # Cleanup
            docker image prune -f
            echo "Deployment complete"

      - name: Health check
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            echo "Waiting for container to start..."
            sleep 10
            for i in 1 2 3 4 5; do
              STATUS=$(curl -s -o /dev/null -w '%{http_code}' http://127.0.0.1:4100/ || true)
              if [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 500 ]; then
                echo "Health check passed (HTTP $STATUS)"
                exit 0
              fi
              echo "Attempt $i: HTTP $STATUS, retrying in 5s..."
              sleep 5
            done
            echo "Health check failed after 5 attempts"
            docker logs ai-points-platform --tail 30

            # Auto-cleanup on failure
            echo "Cleaning up failed deployment..."
            docker compose -f /opt/apps/ai-points-platform/docker-compose.yml down 2>/dev/null || true
            docker image prune -f
            exit 1
