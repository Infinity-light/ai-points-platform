services:
  postgres:
    image: postgres:15-alpine
    container_name: ai_points_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-ai_points}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ai_points_redis
    restart: unless-stopped
    command: redis-server
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  backend:
    image: ghcr.io/infinity-light/ai-points-backend:latest
    container_name: ai_points_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: .env
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
    volumes:
      - uploads_data:/app/uploads
      - config_data:/app/data
    ports:
      - "4000:3000"

  frontend:
    image: ghcr.io/infinity-light/ai-points-frontend:latest
    container_name: ai_points_frontend
    restart: unless-stopped
    ports:
      - "4100:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
  uploads_data:
  config_data:
