<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Background circle -->
  <circle cx="16" cy="16" r="15" fill="#1a1b2e" stroke="#6366F1" stroke-width="1.5"/>

  <!-- Rocket trail arc (silver) -->
  <path
    d="M 22 10 Q 26 16 22 22"
    fill="none"
    stroke="#C0C7D6"
    stroke-width="1.5"
    stroke-linecap="round"
    opacity="0.6"
  />
  <path
    d="M 24 10 Q 29 16 24 22"
    fill="none"
    stroke="#C0C7D6"
    stroke-width="1"
    stroke-linecap="round"
    opacity="0.35"
  />

  <!-- Letter "C" in indigo -->
  <path
    d="M 21 10.5
       A 8 8 0 1 0 21 21.5"
    fill="none"
    stroke="#6366F1"
    stroke-width="3.5"
    stroke-linecap="round"
  />

  <!-- Rocket tip (small triangle at the arc end) -->
  <polygon
    points="22,9 24,11.5 20,11"
    fill="#C0C7D6"
  />
</svg>
